version: "3.8"

services:
  # ============================================
  # PostgreSQL 数据库
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: pcms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pcms
      POSTGRES_USER: pcms
      POSTGRES_PASSWORD: pcms123
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcms -d pcms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcms-network

  # ============================================
  # Go 后端服务
  # ============================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pcms-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: pcms
      DB_PASSWORD: pcms123
      DB_NAME: pcms
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-pcms-jwt-secret-change-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pcms-network

  # ============================================
  # Vue 前端 + Nginx
  # ============================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pcms-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server
    networks:
      - pcms-network

volumes:
  pgdata:
  uploads:

networks:
  pcms-network:
    driver: bridge
